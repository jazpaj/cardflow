services:
  - type: web
    name: cardflow
    runtime: node
    buildCommand: cd server && npm install && cd ../client && npm install && npm run build
    startCommand: cd server && node index.js
    disk:
      name: cardflow-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        value: https://cardflow-6dy2.onrender.com
      - key: DB_PATH
        value: /data
